<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罕用 App 倉庫</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-fluid {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: fixed;
            inset: 0;
            z-index: -10;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #8b5cf6 !important;
            ring: 2px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="bg-fluid"></div>

    <div id="app" class="min-h-screen pb-20">
        <!-- Loading Screen -->
        <div id="loading-screen" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-purple-500 mb-4"></i>
            <p id="loading-text" class="text-purple-200/60 tracking-widest font-light">正在開啟倉庫資料...</p>
        </div>

        <!-- Header -->
        <header class="glass-panel sticky top-0 z-40 border-b border-white/5">
            <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center space-x-3 w-full sm:w-auto">
                    <div class="bg-purple-600/20 p-2 rounded-2xl border border-purple-500/30">
                        <i data-lucide="archive" class="text-purple-400 w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">罕用 App 倉庫</h1>
                        <p class="text-[10px] text-white/40 uppercase tracking-tighter">Rare App Vault</p>
                    </div>
                </div>

                <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                    <!-- 回首頁按鈕 -->
                    <a href="https://weichun0203.github.io/wei/" title="回首頁" class="glass-panel p-2.5 rounded-xl hover:bg-white/10 transition-all text-white/60 hover:text-white border-white/10 active:scale-95">
                        <i data-lucide="home" class="w-5 h-5"></i>
                    </a>

                    <div class="w-px h-6 bg-white/10 mx-1"></div>

                    <button id="quick-import-btn" onclick="togglePromptModal(true, 'quick-import')" title="快捷導入您的清單" class="glass-panel p-2.5 rounded-xl hover:bg-purple-500/20 transition-all text-purple-400 hover:text-purple-300 border-purple-500/20 active:scale-95">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                    </button>
                    <button onclick="handleExportCSV()" title="匯出 CSV" class="glass-panel p-2.5 rounded-xl hover:bg-white/10 transition-all text-white/60 hover:text-white border-white/10 active:scale-95">
                        <i data-lucide="download-cloud" class="w-5 h-5"></i>
                    </button>
                    <button onclick="triggerImport()" title="匯入 CSV" class="glass-panel p-2.5 rounded-xl hover:bg-white/10 transition-all text-white/60 hover:text-white border-white/10 active:scale-95">
                        <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                    </button>
                    <input type="file" id="csv-import-input" accept=".csv" class="hidden" onchange="handleImportCSV(event)">
                    
                    <div class="w-px h-6 bg-white/10 mx-1"></div>
                    
                    <button onclick="toggleModal(true)" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2.5 rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-purple-900/40 active:scale-95 text-sm font-semibold whitespace-nowrap">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>存入新 App</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 py-6">
            <!-- Search & Filter -->
            <div class="flex flex-col sm:flex-row gap-4 mb-8">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-white/30 w-5 h-5"></i>
                    <input id="search-input" type="text" placeholder="搜尋名稱或備註..." oninput="handleSearch()" class="w-full pl-10 pr-4 py-3 rounded-xl outline-none transition-all">
                </div>
                <div id="category-filters" class="flex gap-2 overflow-x-auto pb-2 sm:pb-0 scrollbar-hide"></div>
            </div>

            <!-- Apps List -->
            <div id="apps-container" class="grid grid-cols-3 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 sm:gap-4"></div>
        </main>

        <footer class="mt-10 pb-10 text-center">
            <div id="sync-status" class="flex items-center justify-center gap-1.5 text-[10px] text-white/30 transition-all">
                <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                <span id="status-text">初始化中...</span>
            </div>
        </footer>

        <!-- Detail Modal -->
        <div id="detail-modal" onclick="if(event.target === this) toggleDetailModal(false)" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4 transition-all">
            <div class="glass-panel w-full max-w-sm rounded-3xl bg-slate-900/95 shadow-2xl relative overflow-hidden fade-in">
                <div class="p-6">
                    <div class="flex flex-col items-center text-center mb-6">
                        <div id="detail-emoji" class="text-5xl bg-black/30 w-20 h-20 flex items-center justify-center rounded-3xl border border-white/10 mb-4">📱</div>
                        <h2 id="detail-name" class="text-2xl font-bold text-white mb-1 tracking-tight">App 名稱</h2>
                        <span id="detail-category" class="px-3 py-1 bg-purple-500/20 text-purple-300 border border-purple-500/30 text-xs font-bold rounded-full uppercase tracking-wider">分類</span>
                    </div>
                    <div id="detail-note-container" class="bg-white/5 p-4 rounded-2xl border border-white/5 mb-6">
                        <p id="detail-note" class="text-white/70 text-sm leading-relaxed italic font-light"></p>
                    </div>
                    <div class="flex flex-col gap-3">
                        <a id="detail-link" href="#" target="_blank" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-bold text-center flex items-center justify-center gap-2 transition-all active:scale-95 shadow-lg shadow-purple-900/40">
                            <i data-lucide="external-link" class="w-5 h-5"></i>開啟商店 / 網頁
                        </a>
                        <div class="flex gap-2">
                            <button onclick="handleDeleteFromDetail()" class="flex-1 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 py-3 rounded-xl font-bold transition-all flex items-center justify-center gap-2 border border-rose-500/20">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>移除
                            </button>
                            <button onclick="toggleDetailModal(false)" class="flex-1 glass-panel hover:bg-white/10 text-white/60 py-3 rounded-xl font-bold transition-all">關閉</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Modal -->
        <div id="add-modal" onclick="if(event.target === this) toggleModal(false)" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-all">
            <div class="glass-panel w-full max-w-lg rounded-t-3xl sm:rounded-2xl bg-slate-900/90 shadow-2xl relative overflow-hidden">
                <div id="modal-form-content">
                    <div class="flex items-center justify-between p-6 border-b border-white/5">
                        <h2 class="text-xl font-bold">存入新 App</h2>
                        <button onclick="toggleModal(false)" class="text-white/40 hover:text-white transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
                    </div>
                    <form id="app-form" onsubmit="handleFormSubmit(event)" class="p-6 space-y-4">
                        <div class="grid grid-cols-4 gap-4">
                            <div class="col-span-3">
                                <label class="block text-[10px] font-bold text-white/40 uppercase mb-1 tracking-widest">App 名稱 *</label>
                                <input name="name" required type="text" placeholder="例如：台北通" class="w-full px-4 py-3 rounded-xl outline-none">
                            </div>
                            <div class="col-span-1">
                                <label class="block text-[10px] font-bold text-white/40 uppercase mb-1 text-center tracking-widest">Emoji</label>
                                <input name="iconEmoji" type="text" value="📱" class="w-full px-4 py-3 rounded-xl outline-none text-center">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-white/40 uppercase mb-1 tracking-widest">分類</label>
                            <select name="category" class="w-full px-4 py-3 rounded-xl outline-none cursor-pointer">
                                <option value="生活">生活</option><option value="工具">工具</option><option value="旅遊">旅遊</option><option value="金融">金融</option><option value="政府">政府</option><option value="購物">購物</option><option value="其他">其他</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-white/40 uppercase mb-1 tracking-widest">商店連結</label>
                            <input name="storeUrl" type="url" placeholder="https://..." class="w-full px-4 py-3 rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-white/40 uppercase mb-1 tracking-widest">備註</label>
                            <textarea name="note" rows="2" placeholder="一年一次的需求原因..." class="w-full px-4 py-3 rounded-xl outline-none resize-none"></textarea>
                        </div>
                        <button type="submit" id="submit-btn" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-bold text-lg transition-all flex items-center justify-center shadow-lg shadow-purple-900/40"><span>存入倉庫</span></button>
                    </form>
                </div>
                <div id="modal-success-content" class="hidden p-12 flex flex-col items-center justify-center text-center fade-in">
                    <div class="bg-emerald-500/20 border border-emerald-500/30 w-24 h-24 rounded-full flex items-center justify-center mb-6 relative"><i data-lucide="check-circle-2" class="text-emerald-400 w-12 h-12"></i></div>
                    <h2 class="text-2xl font-bold mb-2 text-white">存入成功！</h2>
                </div>
            </div>
        </div>

        <!-- Delete Confirm Modal -->
        <div id="delete-modal" onclick="if(event.target === this) toggleDeleteModal(null)" class="fixed inset-0 z-[80] bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-4">
            <div class="glass-panel bg-slate-900/95 border-rose-500/30 w-full max-sm rounded-3xl p-6 shadow-2xl fade-in text-center">
                <div class="bg-rose-500/20 border border-rose-500/30 w-16 h-16 rounded-full flex items-center justify-center mb-4 mx-auto"><i data-lucide="alert-triangle" class="text-rose-400 w-8 h-8"></i></div>
                <h3 class="text-xl font-bold mb-2 text-white">確定要移除嗎？</h3>
                <p id="delete-app-name" class="text-white/60 text-sm mb-6"></p>
                <div class="flex flex-col gap-2">
                    <button onclick="executeDelete()" class="w-full bg-rose-500 hover:bg-rose-600 text-white py-3 rounded-xl font-bold transition-all active:scale-95">確認移除</button>
                    <button onclick="toggleDeleteModal(null)" class="w-full glass-panel hover:bg-white/10 text-white/70 py-3 rounded-xl font-bold transition-all">取消</button>
                </div>
            </div>
        </div>

        <!-- Prompt Modal -->
        <div id="prompt-modal" onclick="if(event.target === this) togglePromptModal(false)" class="fixed inset-0 z-[70] bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4">
            <div class="glass-panel bg-slate-900/95 border-purple-500/30 w-full max-w-sm rounded-3xl p-6 shadow-2xl fade-in text-center">
                <div class="bg-purple-500/20 border border-purple-500/30 w-14 h-14 rounded-full flex items-center justify-center mb-4 mx-auto"><i data-lucide="help-circle" class="text-purple-400 w-7 h-7"></i></div>
                <h3 id="prompt-title" class="text-xl font-bold mb-2 text-white tracking-tight">確認操作</h3>
                <p id="prompt-message" class="text-white/60 text-sm mb-6 leading-relaxed px-4"></p>
                <div class="flex flex-col gap-2">
                    <button id="prompt-confirm-btn" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-3 rounded-xl font-bold transition-all active:scale-95 shadow-lg shadow-purple-900/40">確定</button>
                    <button onclick="togglePromptModal(false)" class="w-full glass-panel hover:bg-white/10 text-white/70 py-3 rounded-xl font-bold transition-all">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        let currentUser = null;
        let allApps = [];
        let currentFilter = '全部';
        let deleteId = null;
        let isCloudMode = false;
        let selectedAppId = null;

        const CATEGORIES = ["全部", "生活", "工具", "旅遊", "金融", "政府", "購物", "其他"];

        window.addEventListener('load', async () => {
            renderCategoryFilters();
            lucide.createIcons();
            
            setTimeout(() => { 
                const loader = document.getElementById('loading-screen');
                if (!loader.classList.contains('hidden')) {
                    loader.classList.add('hidden'); 
                    updateSyncStatus(isCloudMode);
                }
            }, 5000);

            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'rare-app-vault';
                    isCloudMode = true;
                    initAuth(auth, db, appId);
                } else { throw new Error(); }
            } catch (err) {
                isCloudMode = false;
                initLocalMode();
            }
        });

        function updateSyncStatus(isCloud) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            dot.className = `w-1.5 h-1.5 rounded-full ${isCloud ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-orange-500 shadow-[0_0_8px_rgba(249,115,22,0.5)]'}`;
            text.textContent = isCloud ? "雲端同步模式" : "本機儲存模式 (離線)";
        }

        async function initAuth(auth, db, appId) {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) { await signInWithCustomToken(auth, __initial_auth_token); } 
                else { await signInAnonymously(auth); }
            } catch (err) { console.error(err); }
            onAuthStateChanged(auth, (user) => { if (user) { currentUser = user; updateSyncStatus(true); subscribeToApps(db, appId); } });
        }

        function subscribeToApps(db, appId) {
            const appsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'savedApps');
            onSnapshot(appsRef, (snapshot) => {
                allApps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApps();
                document.getElementById('loading-screen').classList.add('hidden');
            }, () => document.getElementById('loading-screen').classList.add('hidden'));
            window.dbRef = db; window.appIdRef = appId;
        }

        function initLocalMode() {
            const savedData = localStorage.getItem('rare_apps_data');
            if (savedData) { try { allApps = JSON.parse(savedData); } catch (e) { allApps = []; } }
            renderApps();
            document.getElementById('loading-screen').classList.add('hidden');
            updateSyncStatus(false);
        }

        function saveLocally() {
            localStorage.setItem('rare_apps_data', JSON.stringify(allApps));
            renderApps();
        }

        // --- UI Logic ---
        window.toggleModal = (show) => {
            const modal = document.getElementById('add-modal');
            modal.classList.toggle('hidden', !show);
            document.getElementById('modal-form-content').classList.remove('hidden');
            document.getElementById('modal-success-content').classList.add('hidden');
        };

        window.toggleDetailModal = (show, appId = null) => {
            const modal = document.getElementById('detail-modal');
            if (!show) { modal.classList.add('hidden'); selectedAppId = null; return; }
            const app = allApps.find(a => a.id === appId);
            if (!app) return;
            selectedAppId = appId;
            document.getElementById('detail-emoji').textContent = app.iconEmoji || '📱';
            document.getElementById('detail-name').textContent = app.name;
            document.getElementById('detail-category').textContent = app.category;
            document.getElementById('detail-note').textContent = app.note || "尚無備註資訊。";
            const link = document.getElementById('detail-link');
            if (app.storeUrl) { link.href = app.storeUrl; link.classList.remove('hidden'); } else { link.classList.add('hidden'); }
            modal.classList.remove('hidden');
            lucide.createIcons();
        };

        window.handleDeleteFromDetail = () => {
            if (!selectedAppId) return;
            const targetId = selectedAppId;
            const app = allApps.find(a => a.id === targetId);
            toggleDetailModal(false);
            toggleDeleteModal(targetId, app ? app.name : '');
        };

        window.toggleDeleteModal = (id, name = '') => {
            const modal = document.getElementById('delete-modal');
            if (id) {
                deleteId = id;
                document.getElementById('delete-app-name').textContent = `您準備移除 「${name}」 的記錄。此操作無法復原。`;
                modal.classList.remove('hidden');
            } else {
                deleteId = null;
                modal.classList.add('hidden');
            }
        };

        window.executeDelete = async () => {
            if (!deleteId) return;
            if (isCloudMode && currentUser) {
                try { await deleteDoc(doc(window.dbRef, 'artifacts', window.appIdRef, 'users', currentUser.uid, 'savedApps', deleteId)); } catch (e) { }
            } else {
                allApps = allApps.filter(a => a.id !== deleteId);
                saveLocally();
            }
            toggleDeleteModal(null);
        };

        window.renderCategoryFilters = () => {
            const container = document.getElementById('category-filters');
            container.innerHTML = CATEGORIES.map(cat => `
                <button onclick="handleCategoryChange('${cat}')" class="filter-btn px-4 py-2 rounded-full text-[10px] font-semibold transition-all border ${currentFilter === cat ? 'bg-purple-600 border-purple-400 text-white shadow-lg' : 'glass-panel text-white/60 border-white/10 hover:bg-white/10'}">${cat}</button>
            `).join('');
        };

        window.renderApps = () => {
            const container = document.getElementById('apps-container');
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allApps.filter(a => {
                const matchSearch = a.name.toLowerCase().includes(term) || (a.note && a.note.toLowerCase().includes(term));
                const matchCat = currentFilter === '全部' || a.category === currentFilter;
                return matchSearch && matchCat;
            });

            if (!filtered.length) {
                container.innerHTML = `<div class="col-span-full py-20 glass-panel rounded-3xl text-center border-dashed border-2 border-white/5 font-light text-white/30 italic">無紀錄</div>`;
                return;
            }

            container.innerHTML = filtered.map(app => `
                <div onclick="toggleDetailModal(true, '${app.id}')" class="glass-panel rounded-2xl p-3 sm:p-5 hover:bg-white/5 transition-all group fade-in flex flex-col items-center text-center cursor-pointer border-white/5 hover:border-purple-500/30">
                    <div class="text-2xl sm:text-3xl bg-black/30 w-12 h-12 sm:w-16 sm:h-16 flex items-center justify-center rounded-xl sm:rounded-2xl border border-white/5 group-hover:scale-110 transition-transform mb-2">${app.iconEmoji || '📱'}</div>
                    <h3 class="font-bold text-white/90 text-[10px] sm:text-base leading-tight truncate w-full px-1">${app.name}</h3>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.handleSearch = () => renderApps();
        window.handleCategoryChange = (cat) => { currentFilter = cat; renderCategoryFilters(); renderApps(); };

        async function upsertApp(appData) {
            const existing = allApps.find(a => a.name.trim().toLowerCase() === appData.name.trim().toLowerCase());
            
            if (isCloudMode && currentUser) {
                try {
                    if (existing) {
                        const docRef = doc(window.dbRef, 'artifacts', window.appIdRef, 'users', currentUser.uid, 'savedApps', existing.id);
                        await updateDoc(docRef, appData);
                    } else {
                        await addDoc(collection(window.dbRef, 'artifacts', window.appIdRef, 'users', currentUser.uid, 'savedApps'), appData);
                    }
                } catch (err) { console.error("Upsert Error:", err); }
            } else {
                if (existing) {
                    Object.assign(existing, appData);
                } else {
                    appData.id = Date.now().toString() + Math.random();
                    allApps.unshift(appData);
                }
                saveLocally();
            }
        }

        window.handleFormSubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const form = e.target;
            const fd = new FormData(form);
            const data = {
                name: fd.get('name'), category: fd.get('category'),
                iconEmoji: fd.get('iconEmoji'), storeUrl: fd.get('storeUrl'), note: fd.get('note'), createdAt: new Date().toISOString()
            };
            btn.disabled = true;
            await upsertApp(data);
            document.getElementById('modal-form-content').classList.add('hidden');
            document.getElementById('modal-success-content').classList.remove('hidden');
            setTimeout(() => { toggleModal(false); form.reset(); btn.disabled = false; }, 1200);
        };

        window.togglePromptModal = (show, type = '', msg = '') => {
            const modal = document.getElementById('prompt-modal');
            if (!show) { modal.classList.add('hidden'); return; }

            modal.classList.remove('hidden');
            lucide.createIcons();
        };

        window.handleExportCSV = () => {
            if (!allApps.length) return;
            const headers = ["App名稱", "分類", "Emoji", "連結", "備註", "日期"];
            const rows = allApps.map(a => [a.name, a.category, a.iconEmoji, a.storeUrl, a.note, new Date(a.createdAt).toLocaleDateString()]);
            const csv = "\ufeff" + headers.join(",") + "\n" + rows.map(r => r.map(c => `"${(c||"").replace(/"/g, '""')}"`).join(",")).join("\n");
            const link = document.createElement("a");
            link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
            link.download = `RareApps_${Date.now()}.csv`; link.click();
        };

        window.triggerImport = () => document.getElementById('csv-import-input').click();
        window.handleImportCSV = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (ev) => {
                const lines = ev.target.result.split(/\n/).slice(1);
                for (const line of lines) {
                    const m = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (!m) continue;
                    const clean = (s) => (s||"").replace(/^"|"$/g, '').replace(/""/g, '"');
                    const item = { 
                        name: clean(m[0]), category: clean(m[1]), iconEmoji: clean(m[2]), 
                        storeUrl: clean(m[3]), note: clean(m[4]), createdAt: new Date().toISOString() 
                    };
                    await upsertApp(item);
                }
                togglePromptModal(true, 'info', 'CSV 匯入完成（重複項已更新）！');
                e.target.value = "";
            };
            reader.readAsText(file);
        };
