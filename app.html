<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>罕用 App 倉庫</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #020617;
            color: #f8fafc;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .bg-fluid {
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #1e1b4b);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            position: fixed;
            inset: 0;
            z-index: -10;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.3) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #8b5cf6 !important;
            ring: 2px rgba(139, 92, 246, 0.3);
        }
    </style>
</head>
<body>
    <div class="bg-fluid"></div>

    <div id="app" class="min-h-screen pb-20">
        <!-- Loading Screen -->
        <div id="loading-screen" class="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center">
            <i data-lucide="loader-2" class="w-10 h-10 animate-spin text-purple-500 mb-4"></i>
            <p id="loading-text" class="text-purple-200/60 tracking-widest font-light">正在開啟倉庫資料...</p>
        </div>

        <!-- Header -->
        <header class="glass-panel sticky top-0 z-40 border-b border-white/5">
            <div class="max-w-4xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
                <div class="flex items-center space-x-3 w-full sm:w-auto">
                    <div class="bg-purple-600/20 p-2 rounded-2xl border border-purple-500/30">
                        <i data-lucide="archive" class="text-purple-400 w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-tight">罕用 App 倉庫</h1>
                        <p class="text-[10px] text-white/40 uppercase tracking-tighter">Rare App Vault</p>
                    </div>
                </div>

                <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                    <!-- Quick Demo Import -->
                    <button id="quick-import-btn" onclick="togglePromptModal(true, 'quick-import')" title="快捷導入您的清單" class="glass-panel p-2.5 rounded-xl hover:bg-purple-500/20 transition-all text-purple-400 hover:text-purple-300 border-purple-500/20 active:scale-95">
                        <i data-lucide="sparkles" class="w-5 h-5"></i>
                    </button>
                    <!-- Export Button -->
                    <button onclick="handleExportCSV()" title="匯出 CSV" class="glass-panel p-2.5 rounded-xl hover:bg-white/10 transition-all text-white/60 hover:text-white border-white/10 active:scale-95">
                        <i data-lucide="download-cloud" class="w-5 h-5"></i>
                    </button>
                    <!-- Import Button -->
                    <button onclick="triggerImport()" title="匯入 CSV" class="glass-panel p-2.5 rounded-xl hover:bg-white/10 transition-all text-white/60 hover:text-white border-white/10 active:scale-95">
                        <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                    </button>
                    <input type="file" id="csv-import-input" accept=".csv" class="hidden" onchange="handleImportCSV(event)">
                    
                    <div class="w-px h-6 bg-white/10 mx-1"></div>
                    
                    <button onclick="toggleModal(true)" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2.5 rounded-xl flex items-center gap-2 transition-all shadow-lg shadow-purple-900/40 active:scale-95 text-sm font-semibold whitespace-nowrap">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>存入新 App</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-4xl mx-auto px-4 py-6">
            <!-- Search & Filter -->
            <div class="flex flex-col sm:flex-row gap-4 mb-8">
                <div class="relative flex-1">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-white/30 w-5 h-5"></i>
                    <input id="search-input" type="text" placeholder="搜尋名稱或備註..." oninput="handleSearch()" class="w-full pl-10 pr-4 py-3 rounded-xl outline-none transition-all">
                </div>
                <div id="category-filters" class="flex gap-2 overflow-x-auto pb-2 sm:pb-0 scrollbar-hide">
                    <!-- Categories will be injected here -->
                </div>
            </div>

            <!-- Apps List -->
            <div id="apps-container" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <!-- App cards will be injected here -->
            </div>
        </main>

        <footer class="mt-10 pb-10 text-center">
            <div id="sync-status" class="flex items-center justify-center gap-1.5 text-[10px] text-white/30 transition-all">
                <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-slate-500"></div>
                <span id="status-text">初始化中...</span>
            </div>
        </footer>

        <!-- Generic Prompt Modal (Replaces Native Alert/Confirm) -->
        <div id="prompt-modal" class="fixed inset-0 z-[70] bg-black/80 backdrop-blur-md hidden flex items-center justify-center p-4">
            <div class="glass-panel bg-slate-900/95 border-purple-500/30 w-full max-w-sm rounded-3xl p-6 shadow-2xl fade-in text-center">
                <div id="prompt-icon-container" class="bg-purple-500/20 border border-purple-500/30 w-16 h-16 rounded-full flex items-center justify-center mb-4 mx-auto">
                    <i data-lucide="help-circle" id="prompt-icon" class="text-purple-400 w-8 h-8"></i>
                </div>
                <h3 id="prompt-title" class="text-xl font-bold mb-2 text-white">確認操作</h3>
                <p id="prompt-message" class="text-white/60 text-sm mb-6 leading-relaxed"></p>
                <div id="prompt-actions" class="flex flex-col gap-2">
                    <button id="prompt-confirm-btn" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-3 rounded-xl font-bold transition-all active:scale-95">確定</button>
                    <button id="prompt-cancel-btn" onclick="togglePromptModal(false)" class="w-full glass-panel hover:bg-white/10 text-white/70 py-3 rounded-xl font-bold transition-all">取消</button>
                </div>
            </div>
        </div>

        <!-- Add Modal -->
        <div id="add-modal" class="fixed inset-0 z-50 bg-black/80 backdrop-blur-md hidden flex items-end sm:items-center justify-center p-0 sm:p-4 transition-all">
            <div class="glass-panel w-full max-w-lg rounded-t-3xl sm:rounded-2xl bg-slate-900/90 shadow-2xl relative overflow-hidden">
                <div id="modal-form-content">
                    <div class="flex items-center justify-between p-6 border-b border-white/5">
                        <h2 class="text-xl font-bold">存入新 App</h2>
                        <button onclick="toggleModal(false)" class="text-white/40 hover:text-white transition-colors">
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>
                    </div>
                    <form id="app-form" onsubmit="handleFormSubmit(event)" class="p-6 space-y-4">
                        <div class="grid grid-cols-4 gap-4">
                            <div class="col-span-3">
                                <label class="block text-[10px] font-bold text-white/40 uppercase mb-1">App 名稱 *</label>
                                <input name="name" required type="text" placeholder="例如：台北通" class="w-full px-4 py-3 rounded-xl outline-none">
                            </div>
                            <div class="col-span-1">
                                <label class="block text-[10px] font-bold text-white/40 uppercase mb-1 text-center">Emoji</label>
                                <input name="iconEmoji" type="text" value="📱" class="w-full px-4 py-3 rounded-xl outline-none text-center">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-white/40 uppercase mb-1">分類</label>
                            <select name="category" class="w-full px-4 py-3 rounded-xl outline-none cursor-pointer">
                                <option value="生活">生活</option>
                                <option value="工具">工具</option>
                                <option value="旅遊">旅遊</option>
                                <option value="金融">金融</option>
                                <option value="政府">政府</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-white/40 uppercase mb-1">商店連結</label>
                            <input name="storeUrl" type="url" placeholder="https://..." class="w-full px-4 py-3 rounded-xl outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-white/40 uppercase mb-1">備註</label>
                            <textarea name="note" rows="2" placeholder="一年一次的需求..." class="w-full px-4 py-3 rounded-xl outline-none resize-none"></textarea>
                        </div>
                        <button type="submit" id="submit-btn" class="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-xl font-bold text-lg transition-all flex items-center justify-center">
                            <span>存入倉庫</span>
                        </button>
                    </form>
                </div>

                <div id="modal-success-content" class="hidden p-12 flex flex-col items-center justify-center text-center fade-in">
                    <div class="bg-emerald-500/20 border border-emerald-500/30 w-24 h-24 rounded-full flex items-center justify-center mb-6 relative">
                        <i data-lucide="check-circle-2" class="text-emerald-400 w-12 h-12"></i>
                        <i data-lucide="sparkles" class="absolute -top-1 -right-1 text-yellow-400 w-6 h-6 animate-bounce"></i>
                    </div>
                    <h2 class="text-2xl font-bold mb-2">存入成功！</h2>
                    <p class="text-white/40 italic font-light">資料已妥善儲存</p>
                </div>
            </div>
        </div>

        <!-- Delete Confirm Modal -->
        <div id="delete-modal" class="fixed inset-0 z-[60] bg-black/90 backdrop-blur-md hidden flex items-center justify-center p-4">
            <div class="glass-panel bg-slate-900/95 border-rose-500/30 w-full max-sm rounded-3xl p-6 shadow-2xl fade-in text-center">
                <div class="bg-rose-500/20 border border-rose-500/30 w-16 h-16 rounded-full flex items-center justify-center mb-4 mx-auto">
                    <i data-lucide="alert-triangle" class="text-rose-400 w-8 h-8"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">確定要移除嗎？</h3>
                <p id="delete-app-name" class="text-white/60 text-sm mb-6"></p>
                <div class="flex flex-col gap-2">
                    <button onclick="executeDelete()" class="w-full bg-rose-500 hover:bg-rose-600 text-white py-3 rounded-xl font-bold transition-all">確認移除</button>
                    <button onclick="toggleDeleteModal(null)" class="w-full glass-panel hover:bg-white/10 text-white/70 py-3 rounded-xl font-bold transition-all">取消</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Global State
        let currentUser = null;
        let allApps = [];
        let currentFilter = '全部';
        let deleteId = null;
        let isCloudMode = false;

        const CATEGORIES = ["全部", "生活", "工具", "旅遊", "金融", "政府", "其他"];

        window.addEventListener('load', async () => {
            renderCategoryFilters();
            lucide.createIcons();

            setTimeout(() => {
                const loader = document.getElementById('loading-screen');
                if (!loader.classList.contains('hidden')) {
                    loader.classList.add('hidden');
                    updateSyncStatus(false);
                }
            }, 5000);

            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    const auth = getAuth(app);
                    const db = getFirestore(app);
                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'rare-app-vault';
                    isCloudMode = true;
                    initAuth(auth, db, appId);
                } else { throw new Error(); }
            } catch (err) {
                isCloudMode = false;
                initLocalMode();
            }
        });

        function updateSyncStatus(isCloud) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            if (isCloud) {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-emerald-500';
                text.textContent = "雲端同步模式";
            } else {
                dot.className = 'w-1.5 h-1.5 rounded-full bg-orange-500';
                text.textContent = "本機儲存模式 (離線)";
            }
        }

        async function initAuth(auth, db, appId) {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) { console.error(err); }

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    updateSyncStatus(true);
                    subscribeToApps(db, appId);
                }
            });
        }

        function subscribeToApps(db, appId) {
            const appsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'savedApps');
            onSnapshot(appsRef, (snapshot) => {
                allApps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderApps();
                document.getElementById('loading-screen').classList.add('hidden');
            }, () => document.getElementById('loading-screen').classList.add('hidden'));

            window.dbRef = db;
            window.appIdRef = appId;
        }

        function initLocalMode() {
            updateSyncStatus(false);
            const savedData = localStorage.getItem('rare_apps_data');
            if (savedData) {
                try { allApps = JSON.parse(savedData); } catch (e) { allApps = []; }
            }
            renderApps();
            document.getElementById('loading-screen').classList.add('hidden');
        }

        function saveLocally() {
            localStorage.setItem('rare_apps_data', JSON.stringify(allApps));
            renderApps();
        }

        // --- UI Logic ---
        window.toggleModal = (show) => {
            const modal = document.getElementById('add-modal');
            modal.classList.toggle('hidden', !show);
            document.getElementById('modal-form-content').classList.remove('hidden');
            document.getElementById('modal-success-content').classList.add('hidden');
        };

        window.togglePromptModal = (show, type = '', message = '', title = '') => {
            const modal = document.getElementById('prompt-modal');
            const confirmBtn = document.getElementById('prompt-confirm-btn');
            const cancelBtn = document.getElementById('prompt-cancel-btn');
            const titleEl = document.getElementById('prompt-title');
            const msgEl = document.getElementById('prompt-message');
            const iconEl = document.getElementById('prompt-icon');

            if (!show) {
                modal.classList.add('hidden');
                return;
            }

            modal.classList.remove('hidden');
            
            // Default setup
            cancelBtn.classList.remove('hidden');
            confirmBtn.textContent = "確定";

            if (type === 'quick-import') {
                titleEl.textContent = "批量導入 App";
                msgEl.textContent = "即將導入您的清單（共 29 個應用程式），並包含官方網址與分類。確定要繼續嗎？";
                confirmBtn.onclick = () => {
                    executeQuickImport();
                    togglePromptModal(false);
                };
            } else if (type === 'info') {
                titleEl.textContent = title || "提示";
                msgEl.textContent = message;
                cancelBtn.classList.add('hidden');
                confirmBtn.onclick = () => togglePromptModal(false);
            }

            lucide.createIcons();
        };

        window.toggleDeleteModal = (id, name = '') => {
            const modal = document.getElementById('delete-modal');
            if (id) {
                deleteId = id;
                document.getElementById('delete-app-name').textContent = `您準備移除 「${name}」 的記錄。此操作無法復原。`;
                modal.classList.remove('hidden');
            } else {
                deleteId = null;
                modal.classList.add('hidden');
            }
        };

        // --- Data Logic ---
        window.renderCategoryFilters = () => {
            const container = document.getElementById('category-filters');
            container.innerHTML = CATEGORIES.map(cat => `
                <button onclick="handleCategoryChange('${cat}')" 
                    class="filter-btn px-4 py-2 rounded-full text-xs font-semibold transition-all border 
                    ${currentFilter === cat ? 'bg-purple-600 border-purple-400 text-white shadow-lg' : 'glass-panel text-white/60 border-white/10 hover:bg-white/10'}">
                    ${cat}
                </button>
            `).join('');
        };

        window.renderApps = () => {
            const container = document.getElementById('apps-container');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filtered = allApps.filter(app => {
                const matchesSearch = app.name.toLowerCase().includes(searchTerm) || (app.note && app.note.toLowerCase().includes(searchTerm));
                const matchesCategory = currentFilter === '全部' || app.category === currentFilter;
                return matchesSearch && matchesCategory;
            });

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 glass-panel rounded-3xl text-center border-dashed border-2 border-white/5"><p class="text-white/30 text-sm italic font-light">無相關紀錄</p></div>`;
                return;
            }

            container.innerHTML = filtered.map(app => `
                <div class="glass-panel rounded-2xl p-5 border-l-2 border-l-transparent hover:border-l-purple-500 transition-all group fade-in relative flex flex-col">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex items-center space-x-3">
                            <div class="text-2xl bg-black/30 w-12 h-12 flex items-center justify-center rounded-xl border border-white/5 group-hover:scale-110 transition-transform">
                                ${app.iconEmoji || '📱'}
                            </div>
                            <div>
                                <h3 class="font-bold text-white/90 group-hover:text-purple-300 transition-colors leading-tight">${app.name}</h3>
                                <span class="inline-block px-2 py-0.5 bg-purple-500/10 text-purple-300 border border-purple-500/20 text-[8px] font-bold rounded mt-1 uppercase">
                                    ${app.category}
                                </span>
                            </div>
                        </div>
                        <button onclick="toggleDeleteModal('${app.id}', '${app.name}')" class="text-white/20 hover:text-rose-500 p-2 opacity-0 group-hover:opacity-100 transition-all">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                    ${app.note ? `<div class="bg-black/20 p-3 rounded-lg mb-4 text-xs text-white/60 border border-white/5 italic flex-1 font-light leading-relaxed">「${app.note}」</div>` : '<div class="flex-1"></div>'}
                    <div class="flex items-center justify-between mt-auto pt-3 border-t border-white/5">
                        <span class="text-[9px] text-white/20">${new Date(app.createdAt).toLocaleDateString()}</span>
                        ${app.storeUrl ? `<a href="${app.storeUrl}" target="_blank" class="bg-purple-600/20 hover:bg-purple-600/40 px-3 py-1.5 rounded-lg text-xs text-purple-300 border border-purple-500/20 transition-all">開啟商店</a>` : '<span class="text-[9px] text-white/10 italic">無連結</span>'}
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        };

        window.handleSearch = () => renderApps();
        window.handleCategoryChange = (cat) => { currentFilter = cat; renderCategoryFilters(); renderApps(); };

        window.handleFormSubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const form = e.target;
            const formData = new FormData(form);
            const data = {
                id: Date.now().toString(),
                name: formData.get('name'), category: formData.get('category'),
                iconEmoji: formData.get('iconEmoji'), storeUrl: formData.get('storeUrl'),
                note: formData.get('note'), createdAt: new Date().toISOString()
            };
            btn.disabled = true;
            if (isCloudMode && currentUser) {
                try { await addDoc(collection(window.dbRef, 'artifacts', window.appIdRef, 'users', currentUser.uid, 'savedApps'), data); } catch (err) { }
            } else { allApps.unshift(data); saveLocally(); }
            document.getElementById('modal-form-content').classList.add('hidden');
            document.getElementById('modal-success-content').classList.remove('hidden');
            lucide.createIcons();
            setTimeout(() => { toggleModal(false); form.reset(); btn.disabled = false; }, 1200);
        };

        window.executeDelete = async () => {
            if (!deleteId) return;
            if (isCloudMode && currentUser) {
                try { await deleteDoc(doc(window.dbRef, 'artifacts', window.appIdRef, 'users', currentUser.uid, 'savedApps', deleteId)); } catch (e) { }
            } else { allApps = allApps.filter(a => a.id !== deleteId); saveLocally(); }
            toggleDeleteModal(null);
        };

        window.handleExportCSV = () => {
            if (!allApps.length) return togglePromptModal(true, 'info', '目前倉庫無資料可以匯出。');
            const headers = ["App名稱", "分類", "Emoji", "連結", "備註", "日期"];
            const rows = allApps.map(app => [app.name, app.category, app.iconEmoji, app.storeUrl, app.note, new Date(app.createdAt).toLocaleDateString()]);
            const csv = "\ufeff" + headers.join(",") + "\n" + rows.map(r => r.map(c => `"${(c||"").replace(/"/g, '""')}"`).join(",")).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `RareApps_${Date.now()}.csv`;
            link.click();
        };

        window.triggerImport = () => document.getElementById('csv-import-input').click();
        window.handleImportCSV = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                const rows = event.target.result.split(/\n/).slice(1);
                for (const row of rows) {
                    const m = row.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
                    if (!m) continue;
                    const clean = (s) => (s||"").replace(/^"|"$/g, '').replace(/""/g, '"');
                    const newItem = { name: clean(m[0]), category: clean(m[1]), iconEmoji: clean(m[2]), storeUrl: clean(m[3]), note: clean(m[4]), createdAt: new Date().toISOString() };
                    if (isCloudMode && currentUser) { await addDoc(collection(window.dbRef, 'artifacts', window.appIdRef, 'users', currentUser.uid, 'savedApps'), newItem); }
